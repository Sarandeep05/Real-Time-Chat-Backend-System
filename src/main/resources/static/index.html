<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat | Test Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root{--p:#6366f1;--ph:#4f46e5;--bg:#0f172a;--card:#1e293b;--card2:#334155;--border:#475569;--text:#f8fafc;--muted:#94a3b8;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:var(--bg);color:var(--text);min-height:100vh;display:flex}
        .app{display:flex;width:100%;height:100vh}
        /* Sidebar */
        .sidebar{width:340px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
        .sidebar-header h1{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px}
        .tabs{display:flex;border-bottom:1px solid var(--border)}
        .tab{flex:1;padding:12px;text-align:center;font-size:.85rem;font-weight:500;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s}
        .tab.active{color:var(--p);border-bottom-color:var(--p)}
        .tab:hover{color:var(--text)}
        .tab-content{display:none;flex:1;overflow-y:auto;padding:12px}
        .tab-content.active{display:flex;flex-direction:column;gap:8px}
        /* Auth Form */
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:6px}
        .form-group input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:.2s}
        .form-group input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:.9rem;transition:.2s}
        .btn-primary{background:var(--p);color:#fff}
        .btn-primary:hover{background:var(--ph);transform:translateY(-1px)}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
        .btn-outline:hover{border-color:var(--p);color:var(--text)}
        .btn-sm{padding:8px 14px;font-size:.8rem;width:auto}
        .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
        .badge-green{background:rgba(34,197,94,.15);color:var(--green)}
        .badge-red{background:rgba(239,68,68,.15);color:var(--red)}
        .status-bar{padding:12px 20px;border-top:1px solid var(--border);margin-top:auto}
        /* Users list */
        .user-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:.15s}
        .user-item:hover{background:var(--card2)}
        .user-item.active{background:var(--p);color:#fff}
        .avatar{width:36px;height:36px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;flex-shrink:0}
        .user-item.active .avatar{background:rgba(255,255,255,.2)}
        .user-name{font-weight:500;font-size:.9rem}
        .user-status{font-size:.75rem;color:var(--muted)}
        .online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0}
        .offline-dot{width:8px;height:8px;border-radius:50%;background:var(--border);margin-left:auto;flex-shrink:0}
        /* Chat Area */
        .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg)}
        .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--card)}
        .chat-header h3{font-weight:600;font-size:1rem}
        .chat-header .sub{font-size:.8rem;color:var(--muted)}
        .messages{flex:1;padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
        .msg{max-width:65%;display:flex;flex-direction:column;animation:fadeIn .25s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg.in{align-self:flex-start}
        .msg.out{align-self:flex-end}
        .msg-bubble{padding:10px 16px;border-radius:16px;font-size:.9rem;line-height:1.5}
        .msg.in .msg-bubble{background:var(--card);border-bottom-left-radius:4px}
        .msg.out .msg-bubble{background:var(--p);border-bottom-right-radius:4px}
        .msg-meta{font-size:.7rem;color:var(--muted);margin-top:3px;display:flex;gap:6px}
        .msg.out .msg-meta{justify-content:flex-end}
        .input-bar{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--card)}
        .input-bar input{flex:1;padding:12px 18px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.9rem;outline:none}
        .input-bar input:focus{border-color:var(--p)}
        .send-btn{width:44px;height:44px;background:var(--p);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
        .send-btn:hover{background:var(--ph);transform:scale(1.05)}
        .send-btn svg{width:18px;height:18px;fill:#fff;transform:rotate(45deg)}
        /* Welcome */
        .welcome{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)}
        .welcome .icon{font-size:4rem}
        /* Group create */
        .group-form{padding:12px;background:var(--bg);border-radius:10px;margin-bottom:8px}
        .group-form input{width:100%;padding:8px 12px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
        .error-toast{position:fixed;top:20px;right:20px;background:var(--red);color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;z-index:999;animation:fadeIn .3s}
        .hidden{display:none!important}
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>💬 ChatApp</h1>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('auth')">Auth</div>
            <div class="tab" onclick="switchTab('users')">Users</div>
            <div class="tab" onclick="switchTab('groups')">Groups</div>
        </div>

        <!-- Auth Tab -->
        <div id="tab-auth" class="tab-content active">
            <div style="padding:4px">
                <h3 style="font-size:.95rem;margin-bottom:12px">Register</h3>
                <div class="form-group"><label>Name</label><input id="reg-name" placeholder="Your name"></div>
                <div class="form-group"><label>Email</label><input id="reg-email" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input id="reg-pass" type="password" placeholder="Min 6 chars"></div>
                <button class="btn btn-primary" onclick="register()">Register</button>
                <hr style="border-color:var(--border);margin:16px 0">
                <h3 style="font-size:.95rem;margin-bottom:12px">Login</h3>
                <div class="form-group"><label>Email</label><input id="login-email" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input id="login-pass" type="password" placeholder="Password"></div>
                <button class="btn btn-primary" onclick="login()">Login & Connect</button>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="tab-content">
            <div id="users-list"></div>
        </div>

        <!-- Groups Tab -->
        <div id="tab-groups" class="tab-content">
            <div class="group-form">
                <input id="new-group-name" placeholder="Group name">
                <input id="new-group-members" placeholder="Member IDs (comma separated)">
                <button class="btn btn-primary btn-sm" onclick="createGroup()">Create Group</button>
            </div>
            <div id="groups-list"></div>
        </div>

        <div class="status-bar">
            <div id="status" class="badge badge-red">● Disconnected</div>
            <div id="user-info" style="font-size:.75rem;color:var(--muted);margin-top:4px"></div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div id="chat-welcome" class="welcome">
            <div class="icon">💬</div>
            <div style="font-size:1.1rem;font-weight:500">Real-Time Chat Backend</div>
            <div>Register or login, then select a user or group to start chatting</div>
        </div>
        <div id="chat-view" class="hidden" style="display:flex;flex-direction:column;height:100%">
            <div class="chat-header">
                <div class="avatar" id="chat-avatar">?</div>
                <div><h3 id="chat-title">Chat</h3><div class="sub" id="chat-sub">Direct message</div></div>
            </div>
            <div id="messages" class="messages"></div>
            <div class="input-bar">
                <input id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="error-toast hidden"></div>

<script>
const API = window.location.origin;
let stompClient = null, token = '', currentUser = null, activeChat = null, activeChatType = null;

// --- API Helpers ---
async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || 'Request failed'); }
    return res.json();
}

function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}

// --- Auth ---
async function register() {
    try {
        const data = await api('POST', '/auth/register', {
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-pass').value
        });
        token = data.token; currentUser = data;
        document.getElementById('user-info').textContent = data.name + ' (' + data.email + ')';
        connectWS();
        loadUsers(); loadGroups(); switchTab('users');
    } catch(e) { showToast(e.message); }
}

async function login() {
    try {
        const data = await api('POST', '/auth/login', {
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-pass').value
        });
        token = data.token; currentUser = data;
        document.getElementById('user-info').textContent = data.name + ' (' + data.email + ')';
        connectWS();
        loadUsers(); loadGroups(); switchTab('users');
    } catch(e) { showToast(e.message); }
}

// --- WebSocket ---
function connectWS() {
    const socket = new SockJS(API + '/ws');
    stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({ Authorization: 'Bearer ' + token }, () => {
        document.getElementById('status').className = 'badge badge-green';
        document.getElementById('status').innerHTML = '● Connected';
        stompClient.subscribe('/user/queue/messages', m => onMessage(JSON.parse(m.body)));
        stompClient.subscribe('/user/queue/receipts', m => onReceipt(JSON.parse(m.body)));
        stompClient.subscribe('/user/queue/errors', m => showToast(JSON.parse(m.body).error));
        stompClient.subscribe('/topic/presence', m => onPresence(JSON.parse(m.body)));
    }, e => { showToast('WebSocket error'); });
}

function onMessage(msg) {
    if ((activeChatType === 'direct' && (msg.senderId === activeChat || msg.receiverId === activeChat)) ||
        (activeChatType === 'group' && msg.receiverId === activeChat)) {
        appendMsg(msg);
    }
}

function onReceipt(msg) { /* could update tick marks */ }

function onPresence(data) {
    const el = document.querySelector(`[data-uid="${data.userId}"] .online-dot, [data-uid="${data.userId}"] .offline-dot`);
    if (el) { el.className = data.status === 'ONLINE' ? 'online-dot' : 'offline-dot'; }
}

// --- Users ---
async function loadUsers() {
    try {
        const users = await api('GET', '/users');
        const list = document.getElementById('users-list');
        list.innerHTML = users.filter(u => u.id !== currentUser.userId).map(u =>
            `<div class="user-item" data-uid="${u.id}" onclick="openDirect('${u.id}','${u.name}')">
                <div class="avatar">${u.name[0].toUpperCase()}</div>
                <div><div class="user-name">${u.name}</div><div class="user-status">${u.email}</div></div>
                <div class="${u.status==='ONLINE'?'online-dot':'offline-dot'}"></div>
            </div>`
        ).join('');
    } catch(e) { showToast(e.message); }
}

// --- Groups ---
async function loadGroups() {
    try {
        const groups = await api('GET', '/groups');
        const list = document.getElementById('groups-list');
        list.innerHTML = groups.map(g =>
            `<div class="user-item" onclick="openGroup('${g.id}','${g.name}')">
                <div class="avatar" style="background:var(--amber)">${g.name[0].toUpperCase()}</div>
                <div><div class="user-name">${g.name}</div><div class="user-status">${g.members.length} members</div></div>
            </div>`
        ).join('');
    } catch(e) { showToast(e.message); }
}

async function createGroup() {
    try {
        const name = document.getElementById('new-group-name').value;
        const members = document.getElementById('new-group-members').value.split(',').map(s=>s.trim()).filter(Boolean);
        await api('POST', '/groups', { name, memberIds: members });
        document.getElementById('new-group-name').value = '';
        document.getElementById('new-group-members').value = '';
        loadGroups();
    } catch(e) { showToast(e.message); }
}

// --- Chat ---
async function openDirect(userId, name) {
    activeChat = userId; activeChatType = 'direct';
    document.getElementById('chat-welcome').classList.add('hidden');
    const cv = document.getElementById('chat-view'); cv.classList.remove('hidden'); cv.style.display='flex';
    document.getElementById('chat-title').textContent = name;
    document.getElementById('chat-sub').textContent = 'Direct message';
    document.getElementById('chat-avatar').textContent = name[0].toUpperCase();
    document.getElementById('chat-avatar').style.background = 'var(--p)';
    document.getElementById('messages').innerHTML = '';
    try {
        const history = await api('GET', `/chats/direct?user1=${currentUser.userId}&user2=${userId}&page=0&size=50`);
        (history.content || []).reverse().forEach(m => appendMsg(m));
    } catch(e) { showToast(e.message); }
}

async function openGroup(groupId, name) {
    activeChat = groupId; activeChatType = 'group';
    // Subscribe to group topic
    if (stompClient) stompClient.subscribe('/topic/group/' + groupId, m => onMessage(JSON.parse(m.body)));
    document.getElementById('chat-welcome').classList.add('hidden');
    const cv = document.getElementById('chat-view'); cv.classList.remove('hidden'); cv.style.display='flex';
    document.getElementById('chat-title').textContent = name;
    document.getElementById('chat-sub').textContent = 'Group chat';
    document.getElementById('chat-avatar').textContent = name[0].toUpperCase();
    document.getElementById('chat-avatar').style.background = 'var(--amber)';
    document.getElementById('messages').innerHTML = '';
    try {
        const history = await api('GET', `/chats/group/${groupId}?page=0&size=50`);
        (history.content || []).reverse().forEach(m => appendMsg(m));
    } catch(e) { showToast(e.message); }
}

function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !stompClient || !activeChat) return;
    const msg = { senderId: currentUser.userId, receiverId: activeChat, content, type: activeChatType === 'group' ? 'GROUP' : 'DIRECT' };
    const dest = activeChatType === 'group' ? '/app/chat.group.send' : '/app/chat.send';
    stompClient.send(dest, {}, JSON.stringify(msg));
    input.value = '';
}

function appendMsg(msg) {
    const container = document.getElementById('messages');
    const isMe = msg.senderId === currentUser.userId;
    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    const status = msg.status === 'READ' ? '✓✓' : msg.status === 'DELIVERED' ? '✓✓' : '✓';
    const div = document.createElement('div');
    div.className = 'msg ' + (isMe ? 'out' : 'in');
    div.innerHTML = `<div class="msg-bubble">${msg.content}</div>
        <div class="msg-meta"><span>${isMe ? 'You' : (msg.senderName||msg.senderId)}</span><span>${time}</span>${isMe ? '<span>'+status+'</span>' : ''}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// --- Tabs ---
function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => { t.classList.toggle('active', ['auth','users','groups'][i]===name); });
    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
}
</script>
</body>
</html>
